name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27

      - uses: cachix/cachix-action@v15
        with:
          name: base91
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
        continue-on-error: true

      - name: cargo fmt
        run: nix-build default.nix -A rust-fmt

      - name: cargo clippy
        run: nix-build default.nix -A rust-clippy

      - name: cargo test
        run: nix-build default.nix -A rust-tests

