name: Rust CI

on:
  push:
    branches: [main]
    paths:
      - 'rust/**'
      - 'default.nix'
      - '.github/workflows/rust.yml'
  pull_request:
    paths:
      - 'rust/**'
      - 'default.nix'
      - '.github/workflows/rust.yml'

jobs:
  ci:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v17
        with:
          name: base91
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
        continue-on-error: true

      - name: cargo fmt
        run: nix-build default.nix -A rust-fmt

      - name: cargo clippy
        run: nix-build default.nix -A rust-clippy

      - name: cargo test
        run: nix-build default.nix -A rust-tests

