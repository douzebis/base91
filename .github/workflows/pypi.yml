name: Publish pybase91 to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build wheels — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (manylinux)
          - os: ubuntu-latest
            target: x86_64
          # Linux aarch64 (native ARM runner)
          - os: ubuntu-24.04-arm
            target: aarch64
          # macOS x86_64
          - os: macos-latest
            target: x86_64
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/base91
          target: ${{ matrix.target }}
          args: --release --out dist --features python -i python3.11 python3.12 python3.13
          manylinux: 2_36

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: rust/base91/dist

  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/base91
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: rust/base91/dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, sdist]
    environment:
      name: pypi
      url: https://pypi.org/project/pybase91/
    permissions:
      id-token: write   # trusted publishing (no API token needed)
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
