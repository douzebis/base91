name: REUSE compliance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  reuse:
    name: reuse lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: fsfe/reuse-action@v6
