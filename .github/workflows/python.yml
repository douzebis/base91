name: Python

on:
  push:
    branches: [main]
    paths:
      - 'rust/base91/**'
      - 'default.nix'
      - '.github/workflows/python.yml'
  pull_request:
    paths:
      - 'rust/base91/**'
      - 'default.nix'
      - '.github/workflows/python.yml'

jobs:
  build:
    name: maturin build (pybase91)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27

      - uses: cachix/cachix-action@v15
        with:
          name: base91
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
        continue-on-error: true

      - name: build pybase91
        run: nix-build default.nix -A pybase91
