language = "C"
header   = """/*
 * base91.h — C interface to the Rust basE91 implementation.
 * Generated by cbindgen — do not edit by hand.
 *
 * Drop-in replacement for Joachim Henke's base91.h:
 * identical struct layout and function signatures.
 */"""

include_guard = "BASE91_H"
tab_width     = 4
documentation = true

[export]
include = ["basE91", "basE91_init", "basE91_encode", "basE91_encode_end",
           "basE91_decode", "basE91_decode_end"]

[parse]
parse_deps = false
